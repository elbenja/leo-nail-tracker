<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leo's Nail Tracker 🐾</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f0eb; min-height: 100vh; padding: 24px 16px; color: #2d2d2d; }
  header { text-align: center; margin-bottom: 32px; }
  header h1 { font-size: 28px; font-weight: 700; color: #3a3a3a; }
  header p { font-size: 14px; color: #888; margin-top: 4px; }
  .paws-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 820px; margin: 0 auto 32px; }
  @media (max-width: 600px) { .paws-grid { grid-template-columns: 1fr; } }
  .paw-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .paw-title { font-size: 16px; font-weight: 600; color: #5a4a3a; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .nail-row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0ece8; gap: 12px; }
  .nail-row:last-child { border-bottom: none; }
  .nail-label { font-size: 13px; color: #666; width: 68px; flex-shrink: 0; }
  .nail-icon { font-size: 20px; width: 32px; text-align: center; flex-shrink: 0; }
  .nail-days { font-size: 12px; color: #aaa; flex: 1; min-width: 0; }
  .nail-days.recent { color: #5a9e6f; }
  .nail-days.moderate { color: #c9973a; }
  .nail-days.old { color: #c0503a; }
  .nail-action-btn { background: #f5f0eb; border: none; border-radius: 8px; padding: 6px 10px; font-size: 12px; color: #666; cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
  .nail-action-btn:hover { background: #e8e0d8; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 20px; padding: 28px 24px; width: min(360px, 90vw); box-shadow: 0 8px 40px rgba(0,0,0,0.18); }
  .modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 6px; color: #3a3a3a; }
  .modal .modal-sub { font-size: 13px; color: #999; margin-bottom: 20px; }
  .action-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .action-btn { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border: 2px solid #f0ece8; border-radius: 12px; background: white; cursor: pointer; text-align: left; transition: border-color 0.15s, background 0.15s; font-size: 15px; color: #3a3a3a; }
  .action-btn:hover { border-color: #c9a87a; background: #fdf8f2; }
  .action-btn.selected { border-color: #c9a87a; background: #fdf5e8; }
  .action-btn .btn-icon { font-size: 22px; width: 28px; text-align: center; }
  .action-btn .btn-label { font-weight: 500; }
  .action-btn .btn-desc { font-size: 12px; color: #aaa; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-cancel { padding: 10px 18px; border: none; border-radius: 10px; background: #f0ece8; color: #666; font-size: 14px; cursor: pointer; }
  .btn-save { padding: 10px 22px; border: none; border-radius: 10px; background: #c9a87a; color: white; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .btn-save:hover { background: #b8955f; }
  .btn-save:disabled { background: #ddd; cursor: default; }
  .legend { max-width: 820px; margin: 0 auto; background: white; border-radius: 16px; padding: 18px 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .legend h3 { font-size: 13px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
  .legend-items { display: flex; flex-wrap: wrap; gap: 12px 24px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #555; }
  .legend-item span:first-child { font-size: 18px; }
</style>
</head>
<body>
<header>
  <h1>🐾 Leo's Nail Tracker</h1>
  <p>Tap any nail to log what was done</p>
</header>
<div class="paws-grid" id="pawsGrid"></div>
<div class="legend">
  <h3>Legend</h3>
  <div class="legend-items">
    <div class="legend-item"><span>∞</span><span>Never touched</span></div>
    <div class="legend-item"><span>✅</span><span>Clipped</span></div>
    <div class="legend-item"><span>🔧</span><span>Ground</span></div>
    <div class="legend-item"><span>✂️</span><span>Tip only</span></div>
    <div class="legend-item"><span>⚠️</span><span>Close to quick</span></div>
    <div class="legend-item"><span>🩸</span><span>Bled</span></div>
  </div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Log nail</h2>
    <div class="modal-sub" id="modalSub"></div>
    <div class="action-options" id="actionOptions"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="btnSave" onclick="saveAction()" disabled>Save</button>
    </div>
  </div>
</div>
<script>
var PAWS = [
  { id: 'fl', label: 'Front left',  emoji: '🐾', hasDewclaw: true },
  { id: 'fr', label: 'Front right', emoji: '🐾', hasDewclaw: true },
  { id: 'bl', label: 'Back left',   emoji: '🐾', hasDewclaw: false },
  { id: 'br', label: 'Back right',  emoji: '🐾', hasDewclaw: false }
];
var NAILS = ['Nail 1', 'Nail 2', 'Nail 3', 'Nail 4'];
var ACTIONS = [
  { id: 'clipped', icon: '✅', label: 'Clipped',        desc: 'Full clip' },
  { id: 'ground',  icon: '🔧', label: 'Ground',         desc: 'Grinder used' },
  { id: 'tip',     icon: '✂️',  label: 'Tip only',       desc: 'Just the tip' },
  { id: 'close',   icon: '⚠️', label: 'Close to quick', desc: 'Got close' },
  { id: 'bled',    icon: '🩸', label: 'Bled',           desc: 'Quick nicked' }
];
var STORAGE_KEY = 'leo_nails_v1';

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
}
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
function nailKey(p, n) { return p + '__' + n; }
function daysSince(s) {
  if (!s) return null;
  return Math.floor((Date.now() - new Date(s).getTime()) / 86400000);
}
function daysLabel(d) {
  if (d === null) return '';
  if (d === 0) return 'today';
  if (d === 1) return '1 day ago';
  return d + ' days ago';
}
function daysClass(d) {
  if (d === null) return '';
  if (d <= 7) return 'recent';
  if (d <= 21) return 'moderate';
  return 'old';
}
function iconForEntry(e) {
  if (!e) return '∞';
  var a = ACTIONS.filter(function(x){ return x.id === e.action; })[0];
  return a ? a.icon : '∞';
}

function render() {
  var data = loadData();
  var grid = document.getElementById('pawsGrid');
  grid.innerHTML = '';
  PAWS.forEach(function(paw) {
    var card = document.createElement('div');
    card.className = 'paw-card';
    var nailIds = NAILS.map(function(_, i){ return 'nail' + (i + 1); });
    var nailLabels = NAILS.slice();
    if (paw.hasDewclaw) { nailIds.push('dewclaw'); nailLabels.push('Dewclaw'); }
    card.innerHTML = '<div class="paw-title">' + paw.emoji + ' ' + paw.label + '</div>';
    nailIds.forEach(function(nailId, i) {
      var key = nailKey(paw.id, nailId);
      var entry = data[key];
      var days = entry ? daysSince(entry.date) : null;
      var row = document.createElement('div');
      row.className = 'nail-row';
      var btn = document.createElement('button');
      btn.className = 'nail-action-btn';
      btn.textContent = 'Log';
      btn.addEventListener('click', (function(pid, nid, pl, nl) {
        return function() { openModal(pid, nid, pl, nl); };
      })(paw.id, nailId, paw.label, nailLabels[i]));
      row.innerHTML =
        '<div class="nail-label">' + nailLabels[i] + '</div>' +
        '<div class="nail-icon">' + iconForEntry(entry) + '</div>' +
        '<div class="nail-days ' + daysClass(days) + '">' + (days !== null ? daysLabel(days) : 'never done') + '</div>';
      row.appendChild(btn);
      card.appendChild(row);
    });
    grid.appendChild(card);
  });
}

var modalState = { pawId: null, nailId: null, selected: null };

function openModal(pawId, nailId, pawLabel, nailLabel) {
  modalState = { pawId: pawId, nailId: nailId, selected: null };
  document.getElementById('modalTitle').textContent = pawLabel + ' — ' + nailLabel;
  var data = loadData();
  var existing = data[nailKey(pawId, nailId)];
  var action = existing ? ACTIONS.filter(function(a){ return a.id === existing.action; })[0] : null;
  document.getElementById('modalSub').textContent = existing
    ? 'Last: ' + iconForEntry(existing) + ' ' + (action ? action.label : '') + ' · ' + daysLabel(daysSince(existing.date))
    : 'No history yet';
  var opts = document.getElementById('actionOptions');
  opts.innerHTML = '';
  ACTIONS.forEach(function(action) {
    var btn = document.createElement('button');
    btn.className = 'action-btn';
    btn.dataset.action = action.id;
    btn.innerHTML = '<span class="btn-icon">' + action.icon + '</span><div><div class="btn-label">' + action.label + '</div><div class="btn-desc">' + action.desc + '</div></div>';
    btn.addEventListener('click', function() { selectAction(action.id); });
    opts.appendChild(btn);
  });
  document.getElementById('btnSave').disabled = true;
  document.getElementById('modalOverlay').classList.add('open');
}

function selectAction(id) {
  modalState.selected = id;
  document.querySelectorAll('.action-btn').forEach(function(b) {
    b.classList.toggle('selected', b.dataset.action === id);
  });
  document.getElementById('btnSave').disabled = false;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function saveAction() {
  if (!modalState.selected) return;
  var data = loadData();
  data[nailKey(modalState.pawId, modalState.nailId)] = {
    action: modalState.selected,
    date: new Date().toISOString()
  };
  saveData(data);
  closeModal();
  render();
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

render();
setInterval(render, 60000);
</script>
</body>
</html>
